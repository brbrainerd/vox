[package]
name = "vox_generated_app"
version = "0.1.0"
edition = "2021"

[workspace]

[dependencies]
tokio = { version = "1", features = ["full"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
axum = "0.7"
tower = "0.4"
rust-embed = "8"
mime_guess = "2"
tracing = "0.1"
tracing-subscriber = "0.3"
vox-runtime = { path = "../../crates/vox-runtime" }
